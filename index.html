<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>晨興經節綱要復習</title>
<style>
/* 全域設定 */
* { box-sizing: border-box; }

:root {
    /* 預設顏色 (藍色系) */
    --primary-color: #0044CC; 
    --highlight-bg: #F4F8FB; 
    --header-bg: #E6F0F9;    
    --text-color: #111;
    --container-border: #ccc;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei", sans-serif;
    background-color: #eef2f5; 
    margin: 0;
    padding: 0;
    padding-top: 60px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
}

.container {
    background-color: var(--highlight-bg);
    width: 100%;
    max-width: 800px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    border: 1px solid var(--container-border);
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
    margin-bottom: 20px;
    transition: background-color 0.3s;
}

/* 標頭區域 */
header {
    background-color: var(--header-bg);
    text-align: center;
    padding: 15px 10px;
    border-bottom: 2px solid var(--container-border);
    transition: background-color 0.3s;
}

h1 {
    font-size: 1.5rem;
    margin: 0 0 10px 0;
    font-weight: normal;
    color: #000;
    line-height: 1.3;
}

.main-theme {
    color: var(--primary-color);
    font-weight: bold;
    font-size: 1.2rem;
    margin-bottom: 5px;
    line-height: 1.4;
    transition: color 0.3s;
}

.sub-theme {
    color: var(--primary-color);
    font-weight: bold;
    font-size: 1.1rem;
    line-height: 1.4;
    margin-bottom: 15px;
    transition: color 0.3s;
}

/* 按鈕群組 */
.btn-group {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 5px;
}

.action-btn {
    display: inline-block;
    background-color: #fff;
    padding: 8px 15px;
    border-radius: 20px;
    text-decoration: none;
    font-size: 0.95rem;
    transition: all 0.2s;
    cursor: pointer;
    font-weight: bold;
    border: 1px solid #888;
    color: #444;
}

.action-btn:active {
    transform: scale(0.98);
    background-color: #ddd;
}

.guide-btn {
    color: #006400;
    border: 1px solid #006400;
}

/* 日期導航列 */
.nav-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    padding: 10px 5px;
    background-color: #fff;
    border-bottom: 1px dashed var(--container-border);
    flex-wrap: wrap;
}

.nav-btn {
    background-color: var(--header-bg);
    border: 1px solid var(--container-border);
    border-radius: 5px;
    padding: 8px 10px;
    font-size: 0.95rem;
    cursor: pointer;
    font-weight: bold;
    color: #333;
    user-select: none;
    white-space: nowrap;
    transition: background-color 0.3s;
}

.nav-btn:active {
    filter: brightness(0.9);
}

input[type="date"] {
    font-size: 1.1rem;
    padding: 5px;
    border: 1px solid #999;
    border-radius: 5px;
    background: #fff;
    color: #000;
    font-family: inherit;
    max-width: 150px;
}

.weekday-display {
    font-size: 1.1rem;
    font-weight: bold;
    color: var(--primary-color);
    margin-left: 5px;
    transition: color 0.3s;
}

/* 內容區域 */
.content-box {
    padding: 15px 20px;
    font-size: 1.35rem; 
    line-height: 1.8;
    background-color: transparent;
    text-align: justify;
    color: var(--text-color);
    min-height: 200px;
    word-wrap: break-word;
    overflow-wrap: break-word; 
}

.section-label {
    color: #D32F2F;
    font-weight: bold;
    font-size: 1.4rem;
    text-align: center;
    display: block;
    margin-bottom: 20px;
    letter-spacing: 1px;
    line-height: 1.4;
    white-space: pre-line;
}

.verse-ref {
    font-weight: bold;
    text-align: right;
    display: block;
    margin-top: 20px;
    color: #555;
    font-size: 1.2rem;
}

/* 頁尾區域 */
footer {
    background-color: var(--header-bg);
    padding: 20px;
    text-align: center;
    font-size: 1.1rem;
    border-top: 2px solid var(--container-border);
    color: #222;
    transition: background-color 0.3s;
}

.footer-title {
    font-weight: bold;
    margin-bottom: 10px;
    font-size: 1.3rem;
    color: #000;
}

.lyrics {
    text-align: left;
    display: inline-block;
    line-height: 1.6;
    font-size: 1rem;
    color: #333;
}

/* 字體放大按鈕 */
.font-btn {
    position: fixed;
    top: 10px;
    right: 10px;
    background-color: var(--primary-color);
    color: white;
    border: 2px solid #fff;
    border-radius: 50px;
    padding: 6px 12px;
    font-size: 0.9rem;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    z-index: 1000;
    transition: background-color 0.3s;
}

.font-btn:active {
    filter: brightness(0.8);
    transform: scale(0.95);
}

/* 使用說明 彈跳視窗 */
.modal {
    display: none;
    position: fixed;
    z-index: 2000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.6);
    overflow: auto;
}

.modal-content {
    background-color: #fff;
    margin: 10% auto;
    padding: 20px;
    border: 1px solid #888;
    width: 90%;
    max-width: 600px;
    border-radius: 10px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    position: relative;
    font-size: 1.1rem;
    line-height: 1.6;
}

.close-x {
    color: #aaa;
    float: right;
    font-size: 28px;
    font-weight: bold;
    cursor: pointer;
}

.modal-h2 {
    color: var(--primary-color);
    border-bottom: 2px solid #eee;
    padding-bottom: 10px;
    margin-top: 0;
    font-size: 1.5rem;
}

.modal-section {
    margin-bottom: 15px;
}

.modal-section h3 {
    color: #D32F2F;
    margin-bottom: 8px;
    font-size: 1.2rem;
}

.close-big-btn {
    display: block;
    width: 100%;
    padding: 12px;
    background-color: var(--primary-color);
    color: white;
    text-align: center;
    border: none;
    border-radius: 8px;
    font-size: 1.1rem;
    font-weight: bold;
    cursor: pointer;
    margin-top: 20px;
    transition: background-color 0.3s;
}

/* 手機版特別調整 */
@media (max-width: 600px) {
    body { padding-top: 55px; }
    .container {
        border-radius: 0;
        border-left: none;
        border-right: none;
        box-shadow: none;
        margin-bottom: 0;
    }
    h1 { font-size: 1.3rem; }
    .main-theme { font-size: 1.1rem; }
    .sub-theme { font-size: 1rem; }
    .content-box { padding: 15px; font-size: 1.25rem; }
    .section-label { font-size: 1.2rem; }
}
</style>
</head>
<body>

<button class="font-btn" id="fontToggleBtn" onclick="toggleFontSize()">A+ 字體放大</button>

<div class="container">
    <header id="mainHeader">
        <h1 id="headerTitle">晨興經節綱要復習</h1>
        <div class="main-theme" id="headerTheme">主題載入中...</div>
        <div class="sub-theme" id="headerSubTheme">副標題載入中...</div>

        <div class="btn-group">

            </a>

                📖 使用說明
            </button>
        </div>

    <div class="nav-bar">

        <span id="currentWeekDay" class="weekday-display"></span>
    </div>

    <div class="content-box" id="dailyContent">

    </div>

    <footer>
        <div class="footer-title" id="footerTitle">詩歌載入中...</div>
        <div class="lyrics" id="footerLyrics"></div>
    </footer>
</div>

<!-- 使用說明 -->
<div id="guideModal" class="modal">

                <li><strong>前一天 / 後一天</strong>：點擊按鈕可快速切換。</li>
                <li><strong>選擇日期</strong>：點擊中間的日期框可自由選擇。</li>
            </ul>
        </div>

        <div class="modal-section">

            <ul>
                <li>點擊右上角的 <strong>[A+ 字體放大]</strong> 按鈕。</li>
                <li>也可直接用兩指在螢幕上放大縮小。</li>
            </ul>
        </div>

        <button class="close-big-btn" onclick="closeGuide()">我知道了，返回首頁</button>
    </div>
</div>

<script>
// 資料庫
const db =[
    // --- 舊有資料 (節錄與重點保留) ---
    { date: "2026-03-09", type: `經節`, text: `1、耶和華如此說，天是我的座位，地是我的腳凳；你們要在那裏為我建造殿宇？那裏是我安息的地方？\n2、耶穌對他說，狐狸有洞，天空的飛鳥有窩，人子卻沒有枕頭的地方。`, ref: `(賽六六 1，路九 58)` },
    { date: "2026-03-10", type: `經節`, text: `3、我又聽見主的聲音，說，我可以差遣誰呢？誰肯為我們去呢？我說，我在這裏，請差遣我。\n4、…耶和華阿，求你在這些年間復興你的工作，在這些年間使你的工作顯明出來。`, ref: `(賽六 8，哈三 2 下)` },
    { date: "2026-03-11", type: `壹、前言`, text: `一、在使徒行傳第二章，不僅看見聖靈在外面澆灌下來，門徒們就被聖靈充溢，使三千人受浸得救；也看見聖靈在他們裡面引導，使他們開始過召會生活；這些都是聖靈的行動。`, ref: `` },
    { date: "2026-03-12", type: `壹、前言`, text: `二、早期的召會生活，得救的人『堅定持續在使徒的教訓和交通裏，持續擘餅和禱告』（徒二 42），他們過一種「天天都有」、「家家打開」、「人人都來」的召會生活。`, ref: `` },
    { date: "2026-03-13", type: `壹、前言`, text: `三、這樣的召會生活，不僅使得救的人繁殖，召會往外擴增，也使聖徒得著成全、盡功用；將神的恩典彰顯出來。（十一 23 與註 1）`, ref: `` },
    { date: "2026-03-14", type: `貳、普遍家打開`, text: `一、在使徒行傳二章 46 節中『挨家挨戶』，其介詞有「沿某處而下」、「遍及」之意。\n二、在新路的實行上，家打開要成為普遍的實行；特別是久未聚會的家、邊緣聖徒的家、福音朋友的家、剛得救新人的家，更需要打開，為著牧養、傳揚福音。`, ref: `` },
    { date: "2026-03-15", type: `主日`, text: `今日為主日，請享受召會生活與安息。`, ref: `` },
    { date: "2026-03-31", type: `參、打開家的實行\n四、去開別人的家`, text: `(三) 在新路上說到家聚會時，不是指在聖徒家中的聚會，乃是特指在初信者家中，同他們聚會。\n1、當人剛受浸，對屬靈的事物充滿新鮮與好奇，正是打開他們的家，設立家聚會的最好時機，應該打鐵趁熱，快快設立。\n2、新人受浸後，在三天內，必須回去看望。在一個月內，應該看望十次；…過了第一個月，改成每週去看望一次。連續兩三個月，每週與他們有一次家聚會。`, ref: `` },
    { date: "2026-04-01", type: `參、打開家的實行\n四、去開別人的家`, text: `(四) 去恢復久不聚會的家庭時，可以走姊妹、孩子的門。（參考「主恢復的前景與生機事奉的建立」第十三篇）\n1、去恢復久不聚會的家庭時，不要先從弟兄著手，因為弟兄都很有自尊心，可能不好意思見到弟兄。\n2、姊妹和姊妹很容易親近，因為個個姊妹的心都是軟的，一走就通了；既要走姊妹的門，就不能弟兄去看望，而要姊妹們去。\n3、姊妹一走通，丈夫很難走不通。凡作丈夫的，差不多都是跟著妻子走的。`, ref: `` },
    { date: "2026-04-02", type: `參、打開家的實行\n四、去開別人的家`, text: `(四) 去恢復久不聚會的家庭時，可以走姊妹、孩子的門。（續）\n4、有時你可能觀察到姊妹很硬，不容易走得通；這時，你可以改走孩子的路，先找到他們的孩子。在一個家庭裡，多半是丈夫跟著妻子走，父母跟著兒女走。\n5、總結來說在這事上，我們要很有彈性，從姊妹走得通就姊妹先，從孩子走得通就從孩子先，若是弟兄走得通也可以弟兄先，至終總是一家、一家的將他們恢復。`, ref: `` },
    { date: "2026-04-03", type: `參、打開家的實行\n五、打開家的實行`, text: `五、打開家的實行，要做得「屬靈」、「普遍」、「喜樂」：\n(一) 屬靈：要有屬靈的眼光，每一次的家打開，都是蒙恩的機會；藉著聖徒來訪，就把神的恩典與救恩帶來。這樣的實行，首要在於禱告，要尋求主的引導與同在；藉著帶全家人一同奉獻，一起事奉，就能一同蒙恩。\n(二) 普遍：打開家，不應集中在少數人身上；盼望在新路的實行中，打開家成為普遍的生活方式，漸漸形成屬靈的風氣。使人一得救，就自然進入這樣的水流，得著餧養並被建造。\n(三) 喜樂：藉著上述的操練，必會經歷神的同在。這樣的家打開，使我們與主之間，與聖徒之間都將更為親近，結果就是喜樂，神人同得滿足。`, ref: `` },
    { date: "2026-04-04", type: `肆、實務操練`, text: `一、操練打開家、邀請聖徒來家中相調。在開家之前，先與聖徒禱告、交通，醞釀屬靈的負擔；並與家中成員，一同預備，使與會者都能一同蒙恩。\n二、操練看望人。列出福音朋友、初信聖徒、久未聚會聖徒名單，藉著禱告，尋求主的引導，要去看望誰。過程中，照著神牧養，使人心中感覺快樂、舒適，而能堅定持續的實行。`, ref: `` },
    { date: "2026-04-05", type: `主日`, text: `今日為主日，請享受召會生活與安息。`, ref: `` },
    { date: "2026-04-06", type: `延伸溫習`, text: `可複習上週重點，為將來新的信息預備心。`, ref: `` },
    { date: "2026-04-07", type: `延伸溫習`, text: `可複習上週重點，為將來新的信息預備心。`, ref: `` },

    { 
        date: "2026-04-08", 
        type: `壹、需認識兒女是耶和華所賜的產業`, 
        text: `一、為着神的行動與神合作，成為有託付的父母，在主內栽培並養育兒女。父母若沒有受託的感覺，召會一直不會好；神把人的身體和靈魂交在我們手裏；我們絕不盼望還要把我們的孩子從世界裏再救回來。(創四八 9，詩一二七 3，賽八 18)\n\n二、我們必須領悟，作父母必須約束自己，犧牲自己的自由；要不然，神把人的身體和靈魂交在你的手裏，將來你沒有法子見你的神。(林前九 25，加五 22～23)`,

    },
    { 
        date: "2026-04-09", 
        type: `壹、需認識兒女是耶和華所賜的產業`, 
        text: `三、我們必須看見，我們如果要真實的帶領兒女往主面前去，我們必須是與神同行的人；我們不能用手指着天而把兒女打發到主那裏去；我們必須在他們前面走。(林前九 27，羅二 21)\n\n1、以諾生了瑪土撒拉之後，聖經說他與神同行；當家庭的負擔在他身上的時候，他感到他的責任太大了，他無法憑自己應付；所以他開始與神同行。(創五 21～22)\n2、當參孫還在母腹中的時候，他就被聖別成為拿細耳人；參孫從母腹裏開始，一生都作拿細耳人。(士十三 7)\n3、哈拿迫切的禱告，主要不是為着她自己而是為着神；她向神許願，如果神給她一個男孩，她就藉着拿細耳人的願把這個孩子還給神。(撒上一 11，22，28)`,

    {

        ref: ``

    {

let currentDisplayDate = new Date();
let currentFontSizeState = 0; 
const fontStates =[
    { size: '1.35rem', label: 'A+ 字體放大' },
    { size: '1.7rem', label: 'A++ 特大字體' },
    { size: '2.0rem', label: '↺ 恢復預設' }
];

function toggleFontSize() {
    currentFontSizeState = (currentFontSizeState + 1) % fontStates.length;
    const newState = fontStates[currentFontSizeState];
    const contentBox = document.getElementById('dailyContent');
    contentBox.style.fontSize = newState.size;
    document.getElementById('fontToggleBtn').textContent = newState.label;
}

function updateContent() {
    const weekDayOptions = { weekday: 'long', timeZone: 'Asia/Taipei' };
    const weekDayStr = currentDisplayDate.toLocaleDateString('zh-TW', weekDayOptions);
    document.getElementById('currentWeekDay').textContent = weekDayStr;

    const y = currentDisplayDate.getFullYear();
    const m = String(currentDisplayDate.getMonth() + 1).padStart(2, '0');
    const d = String(currentDisplayDate.getDate()).padStart(2, '0');
    const searchKey = `${y}-${m}-${d}`;

    document.getElementById('datePicker').value = searchKey;

    const headerTheme = document.getElementById('headerTheme');
    const headerSubTheme = document.getElementById('headerSubTheme');
    const pdfLinkBtn = document.getElementById('pdfLinkBtn');
    const footerTitle = document.getElementById('footerTitle');
    const footerLyrics = document.getElementById('footerLyrics');
    const root = document.documentElement;

    // --- 樣式與主題重置 (預設藍色系) ---
    root.style.setProperty('--primary-color', '#0044CC');
    root.style.setProperty('--highlight-bg', '#F4F8FB');
    root.style.setProperty('--header-bg', '#E6F0F9');
    root.style.setProperty('--container-border', '#ccddef');

    // 1. 尼希米記 (2026/01/12 ~ 2026/01/18)
    if (searchKey >= '2026-01-12' && searchKey <= '2026-01-18') {
        headerTheme.textContent = "主題：尼希米記(一至六章)";
        headerSubTheme.textContent = "重建城牆、恢復事奉"; 
        pdfLinkBtn.style.display = "none"; 

        footerTitle.textContent = "乘上聖靈的浪潮";
        footerLyrics.innerHTML = "※不再看處境危艱，不再想路途遙遠，不再怕損失試驗，任何的代價我都願；<br>※同來答應主的呼召，乘上聖靈的浪潮，迎向神的榮耀目標，要得我主的稱好。";
    } 
    // 2. 加強增排增區 (2026/02/07 ~ 2026/03/08)
    else if (searchKey >= '2026-02-07' && searchKey <= '2026-03-08') {
        headerTheme.textContent = "主題：加強增排增區的內涵";
        headerSubTheme.textContent = "(一)開家入排"; 

        pdfLinkBtn.style.display = "inline-block";
        pdfLinkBtn.href = "https://flowingstream.org/wp-content/uploads/2026/01/20260104加強增排增區的內涵1-開家入排_0104.pdf";
        pdfLinkBtn.innerHTML = "📎 綱要連結";

        footerTitle.textContent = "建造神的家";
        footerLyrics.innerHTML = "※主，我願獻上自己，建造你生機身體；<br>※打開家，得青年，牧養人，同成全，帶進榮耀召會，讓你能早歸回。";
    }
    // 3. 加強增排增區 - 人人開家 (2026/03/09 ~ 2026/04/07)
    else if (searchKey >= '2026-03-09' && searchKey <= '2026-04-07') {
        headerTheme.textContent = "主題：加強增排增區的內涵";
        headerSubTheme.textContent = "（二）人人開家"; 

        pdfLinkBtn.style.display = "inline-block"; 
        pdfLinkBtn.href = "https://flowingstream.org/wp-content/uploads/2026/02/20260222加強增排增區的內涵（二）人人開家.pdf";
        pdfLinkBtn.innerHTML = "📎 綱要連結";

        footerTitle.textContent = "全都在於罪人的家";
        footerLyrics.innerHTML = "※稅吏的家，貴人的家，寡婦的家，獄卒的家，以至所有信入主的家，千千萬萬像你我的家；<br>※因著蒙恩我打開家，天地之主請來此歇下，神人同居又美又佳，即使天上亦無此畫！";
    }
    // 4. 青少年家長篇 (2026/04/08 ~ 2026/04/19) - 【動態更換為生命成長綠色系】
    else if (searchKey >= '2026-04-08' && searchKey <= '2026-04-19') {
        // 套用溫馨、象徵成長的綠色調
        root.style.setProperty('--primary-color', '#1B5E20'); // 森林深綠
        root.style.setProperty('--highlight-bg', '#F1F8E9');  // 柔和淺綠底
        root.style.setProperty('--header-bg', '#DCEDC8');     // 主題色淺綠

        headerTheme.textContent = "主題：青少年家長篇";
        headerSubTheme.textContent = "第二篇：成為有託付的父母";

        pdfLinkBtn.style.display = "inline-block"; 
        pdfLinkBtn.href = "https://flowingstream.org/wp-content/uploads/2026/03/2026北市青少年服事事奉相調綱要_第二篇.pdf";
        pdfLinkBtn.innerHTML = "📎 綱要連結";

        footerTitle.textContent = "為神永遠的經綸";
        footerLyrics.innerHTML = "※願神這永遠經綸異象，定住我每個心裡方向，啟發我，使我靈裡發旺，更剛強，好模成基督榮耀形象，在生命中作王，將聖城撒冷帶到地上。";
    }
    // 5. 預設：奔跑增排增區的賽程(四)
    else {
        headerTheme.textContent = "主題：奔跑增排增區的賽程(四)";
        headerSubTheme.textContent = "檢核光景、持守祝福、逐步達標";
        
        pdfLinkBtn.style.display = "inline-block"; 
        pdfLinkBtn.href = "https://flowingstream.org/wp-content/uploads/2025/12/%E5%A5%94%E8%B7%91%E5%A2%9E%E6%8E%92%E5%A2%9E%E5%8D%80%E7%9A%84%E8%B3%BD%E7%A8%8B%E5%9B%9B-%E6%AA%A2%E6%A0%B8%E5%85%89%E6%99%AF%E3%80%81%E6%8C%81%E5%AE%88%E7%A5%9D%E7%A6%8F%E3%80%81%E9%80%90%E6%AD%A5%E9%81%94%E6%A8%99.pdf";
        pdfLinkBtn.innerHTML = "📎 綱要連結";

        footerTitle.textContent = "乘上聖靈的浪潮";
        footerLyrics.innerHTML = "※不再看處境危艱，不再想路途遙遠，不再怕損失試驗，任何的代價我都願；<br>※同來答應主的呼召，乘上聖靈的浪潮，迎向神的榮耀目標，要得我主的稱好。";
    }

    const result = db.find(item => item.date === searchKey);
    const contentBox = document.getElementById('dailyContent');

    if (result) {
        contentBox.innerHTML = `
            <span class="section-label">${result.type}</span>
            <p>${result.text.replace(/\n/g, '<br>')}</p>
            ${result.ref ? `<span class="verse-ref">${result.ref}</span>` : ''}
        `;
    } else {
        contentBox.innerHTML = `
            <span class="section-label" style="color:#999">本日期無進度</span>
            <p style="text-align:center; color:#555; margin-top:20px;">
                日期：${searchKey}<br>
                本日不在進度範圍內。
            </p>
        `;
    }
}

function onDateSelect() {
    const picker = document.getElementById('datePicker');
    if(picker.value) {
        const[y, m, d] = picker.value.split('-').map(Number);
        currentDisplayDate = new Date(y, m - 1, d);
        updateContent();
    }
}

function changeDay(offset) {
    currentDisplayDate.setDate(currentDisplayDate.getDate() + offset);
    updateContent();
}

// --- 使用說明 Modal 控制 ---
function openGuide() {
    document.getElementById('guideModal').style.display = "block";
}

function closeGuide() {
    document.getElementById('guideModal').style.display = "none";
}

window.onclick = function(event) {
    const modal = document.getElementById('guideModal');
    if (event.target == modal) {
        modal.style.display = "none";
    }
}

document.addEventListener('DOMContentLoaded', () => {
    updateContent();
});

</script>
